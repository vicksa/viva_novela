services:
  - type: web
    name: viva-novela-api
    runtime: node
    rootDir: api
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        sync: false
      - key: CORS_ORIGIN
        value: http://localhost:8081,http://localhost:5173,http://localhost:5174

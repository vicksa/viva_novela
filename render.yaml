databases:
  - name: viva-novela-db
    plan: free
    databaseName: viva_novela
    user: viva_novela

services:
  - type: web
    name: viva-novela-api
    runtime: node
    rootDir: api
    plan: free
    buildCommand: npm install
    startCommand: node src/seed/seedIfEmpty.js && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: viva-novela-db
          property: connectionString
      - key: CORS_ORIGIN
        value: http://localhost:8081,http://localhost:5173,http://localhost:5174,https://viva-novela-admin.onrender.com
      - key: CLOUDINARY_URL
        sync: false

  - type: web
    name: viva-novela-admin
    runtime: static
    rootDir: admin
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        value: https://viva-novela-api-kfcb.onrender.com/api
